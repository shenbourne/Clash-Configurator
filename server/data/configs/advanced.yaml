# Clash Configurator Metadata
# id: bf0d9ba6-7262-44c4-a6cd-527444991126
# name: advanced
# createdAt: 2026-03-20T14:52:12.358Z
# updatedAt: 2026-04-02T04:58:06.437Z

mixed-port: 7890

allow-lan: false

bind-address: '*'

mode: rule

log-level: info

ipv6: false

sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - localhost.ptlogin2.qq.com
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - tls://8.8.8.8:853
    - tls://1.1.1.1:853

proxies:

proxy-providers:
  Youtu:
    type: http
    url: https://scribe.shenb.one/proxy/youtu.yaml
    interval: 3600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
    override:
      additional-prefix: 'Youtu | '
    id: Youtu
  TAG:
    type: http
    url: https://scribe.shenb.one/proxy/TAG.yaml
    interval: 3600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
    override:
      additional-prefix: 'TAG | '
    id: TAG

  #Tkong
  Tkong-Edge:
    type: http
    url: https://scribe.tkong.uk/feb2026_304835972.yaml
    interval: 3600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
    override:
      additional-prefix: 'Tkong Edge | '
    id: Tkong-Edge
  Tkong-Core:
    type: http
    url: https://access.tkong.uk/s/9b0988cbedd58f4ff51fff0838712312
    interval: 3600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
    override:
      additional-prefix: 'Tkong Core | '
    id: Tkong-Core

proxy-groups:
  - name: 默认
    type: select
    proxies:
      - 自动选择
      - Tkong Core
      - Tkong Edge
      - Youtu
      - TAG
      - 香港
      - 台湾
      - 日本
      - 新加坡
      - 美国
      - 全部节点
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Proxy.png
    id: 默认
  - name: 全部节点
    type: select
    include-all: true
    id: 全部节点
  - name: Tkong Core
    type: url-test
    include-all: true
    interval: 300
    url: http://www.gstatic.com/generate_204
    filter: 'Tkong Core '
    proxies: []
    tolerance: 50
    use:
      - Tkong-Core
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/HK.png
    id: Tkong Core
  - name: Tkong Edge
    type: url-test
    include-all: true
    interval: 300
    filter: 'Tkong Edge '
    proxies: []
    use:
      - Tkong-Edge
    url: http://www.gstatic.com/generate_204
    tolerance: 50
    id: Tkong Edge
  - name: Youtu
    type: url-test
    include-all: true
    interval: 300
    filter: 'Youtu '
    proxies: []
    use:
      - Youtu
    url: http://www.gstatic.com/generate_204
    tolerance: 50
    id: Youtu
  - name: TAG
    type: url-test
    include-all: true
    interval: 300
    filter: 'TAG '
    proxies: []
    use:
      - TAG
    url: http://www.gstatic.com/generate_204
    tolerance: 50
    id: TAG
  - name: 自动选择
    type: url-test
    include-all: true
    interval: 300
    filter: (?i)^(?!.*(?:直连|拒绝访问)).*
    tolerance: 10
    id: 自动选择

  #软件分组
  - name: AI
    type: url-test
    include-all: true
    interval: 300
    filter: (?i)GPT
    id: AI
  - name: Google
    type: url-test
    include-all: true
    interval: 300
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Google_Search.png
    id: Google
  - name: Apple
    type: url-test
    include-all: true
    interval: 300
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Apple.png
    id: Apple
  - name: Telegram
    type: url-test
    include-all: true
    interval: 300
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Telegram.png
    id: Telegram
  - name: Twitter
    type: url-test
    include-all: true
    interval: 300
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Twitter.png
    id: Twitter
  - name: ehentai
    type: url-test
    include-all: true
    interval: 300
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Panda.png
    id: ehentai
  - name: 巴哈姆特
    type: url-test
    include-all: true
    interval: 300
    url: https://ani.gamer.com.tw/favicon.ico
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Bahamut.png
    id: 巴哈姆特
  - name: YouTube
    type: url-test
    include-all: true
    interval: 300
    url: https://www.youtube.com/favicon.ico
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/YouTube.png
    id: YouTube
  - name: NETFLIX
    type: url-test
    include-all: true
    interval: 300
    url: https://netflix.com/favicon.ico
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Netflix.png
    id: NETFLIX
  - name: Spotify
    type: url-test
    include-all: true
    interval: 300
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Spotify.png
    id: Spotify
  - name: Github
    type: url-test
    include-all: true
    interval: 300
    url: https://www.github.com/favicon.ico
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Github.png
    id: Github
  - name: Docker
    type: url-test
    include-all: true
    interval: 300
    url: https://www.docker.com/favicon.ico
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Spotify.png
    id: Docker
  - name: 其他
    type: select
    proxies:
      - 默认
      - 香港
      - 台湾
      - 日本
      - 新加坡
      - 美国
      - 其它地区
      - 全部节点
      - 自动选择
    id: 其他
  - name: 家宽
    type: url-test
    include-all: true
    interval: 300
    filter: (?i)家宽
    id: 家宽

  #地区分组
  - name: 香港
    type: select
    proxies:
      - 香港自动选择
    include-all: true
    filter: (?i)(?!直连)(港|hk|hongkong|hong kong)
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/HK.png
    id: 香港
  - name: 台湾
    type: select
    proxies:
      - 台湾自动选择
    include-all: true
    filter: (?i)(?!直连)(台|tw|taiwan)
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/TW.png
    id: 台湾
  - name: 日本
    type: select
    proxies:
      - 日本自动选择
    include-all: true
    filter: (?i)(?!直连)(日|jp|japan)
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/JP.png
    id: 日本
  - name: 美国
    type: select
    proxies:
      - 美国自动选择
    include-all: true
    filter: (?i)(?!直连)(美|us|unitedstates|united states)
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/US.png
    id: 美国
  - name: 新加坡
    type: select
    proxies:
      - 新加坡自动选择
    include-all: true
    filter: (?i)(新|sg|singapore)
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/SG.png
    id: 新加坡
  - name: 其它地区
    type: select
    include-all: true
    filter: (?i)^(?!.*(?:🇭🇰|🇯🇵|🇺🇸|🇸🇬|🇨🇳|港|hk|hongkong|台|tw|taiwan|日|jp|japan|新|sg|singapore|美|us|unitedstates|直连)).*
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/Available.png
    id: 其它地区
    proxies:
      - 自动选择
    use: []
  - name: 香港自动选择
    type: url-test
    include-all: true
    interval: 300
    url: http://www.speedtest.net/hongkong
    filter: (?i)(?!直连)(港|hk|hongkong|hong kong)
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/HK.png
    id: 香港自动选择
  - name: 台湾自动选择
    type: url-test
    include-all: true
    interval: 300
    url: http://www.speedtest.net/taiwan
    filter: (?i)(?!直连)(台|tw|taiwan)
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/TW.png
    id: 台湾自动选择
  - name: 日本自动选择
    type: url-test
    include-all: true
    interval: 300
    url: http://www.speedtest.net/japan
    filter: (?i)(?!直连)(日|jp|japan)
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/mini/JP.png
