version: '3.8'

services:
  clash-config-gen:
    build:
      context: .
      dockerfile: Dockerfile
    image: clash-config-gen:latest
    container_name: clash-config-gen
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CORS_ORIGIN=*
    volumes:
      # 数据持久化 - 配置文件
      - ./data/configs:/app/server/data/configs
      # 数据持久化 - 规则集
      - ./data/rule-sets:/app/server/data/rule-sets
      # 数据持久化 - 临时文件
      - ./data/temp:/app/server/data/temp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/configs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"